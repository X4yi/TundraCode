<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TundraCode</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header id="top-bar">
        <div class="top-bar-left">
            <button id="explore-btn" class="btn-dropdown">
                <span>Explore</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div id="file-tabs" class="tabs-container">
            </div>
        </div>
        <div class="top-bar-right">
            <button id="settings-btn" class="btn-icon" title="Settings">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
            <button id="agents-toggle" class="btn-icon" title="Toggle panel de agentes">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
            </button>
        </div>
    </header>

    <div id="explore-dropdown" class="dropdown hidden">
        <div class="dropdown-header">
            <span>Workspace</span>
        </div>
        <div id="file-tree" class="file-tree">
        </div>
    </div>

    <main id="main-container">
        <div id="editor-area" class="editor-area">
            <div id="editor-placeholder" class="editor-placeholder">
                <p>Abre un archivo para comenzar a editar</p>
                <p class="hint">Usa el boton Explore para navegar el workspace</p>
            </div>
            <div id="editor-content" class="editor-content hidden">
                <div class="editor-line-numbers" id="line-numbers"></div>
                <textarea id="code-editor" spellcheck="false"></textarea>
            </div>
            <div id="plan-mode" class="editor-mode hidden">
                <div id="plan-mode-body" class="plan-mode-body"></div>
                <div id="plan-mode-comments" class="plan-mode-comments"></div>
            </div>
            <div id="diff-mode" class="editor-mode hidden">
                <div class="diff-mode-header">
                    <span id="diff-mode-path" class="diff-mode-path"></span>
                    <div id="diff-mode-actions" class="diff-mode-actions"></div>
                </div>
                <div id="diff-mode-body" class="diff-mode-body"></div>
            </div>
        </div>

        <div id="resize-handle" class="resize-handle"></div>

        <aside id="agents-panel" class="agents-panel">
            <div class="panel-header">
                <span class="panel-title">Agent</span>
                <div class="model-selector" style="position: relative;">
                    <button class="model-selector-trigger" id="model-selector-btn">
                        <span class="model-name" id="current-model-name">No model selected</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 15 12 9 18 15"></polyline>
                        </svg>
                    </button>
                    <div class="model-dropdown hidden" id="model-dropdown"></div>
                </div>
            </div>

            <div class="panel-content">
                <div class="agent-chat-main">
                    <div id="chat-messages" class="chat-messages"></div>
                </div>
            </div>

            <div class="agent-input-container">
                <div class="agent-input-wrapper">
                    <textarea id="agent-input" placeholder="Describe what you want to do..." rows="1"></textarea>
                    <div class="mode-widget">
                        <button id="mode-toggle" class="mode-current">
                            <span id="current-mode-label">Plan</span>
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 15 12 9 18 15"></polyline>
                            </svg>
                        </button>
                        <div id="mode-dropdown" class="mode-dropdown hidden">
                            <button class="mode-option active" data-mode="plan">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                Plan
                            </button>
                            <button class="mode-option" data-mode="build">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                                </svg>
                                Build
                            </button>
                            <button class="mode-option" data-mode="ask">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                Ask
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-actions">
                    <button id="new-session-btn" class="btn-icon" title="New Session" onclick="newSession()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
                            <path d="M3 3v5h5"></path>
                        </svg>
                    </button>
                    <button id="agent-stop" class="btn-icon stop-btn hidden" title="Stop agent">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                        </svg>
                    </button>
                    <button id="agent-send" class="btn-icon send-btn" title="Send">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </aside>
    </main>

    <footer id="status-bar">
        <div class="status-left">
            <span id="lsp-status" class="status-item">
                <span class="status-dot offline"></span>
                LSP: off
            </span>
            <span id="git-branch" class="status-item hidden">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="6" y1="3" x2="6" y2="15"></line>
                    <circle cx="18" cy="6" r="3"></circle>
                    <circle cx="6" cy="18" r="3"></circle>
                    <path d="M18 9a9 9 0 0 1-9 9"></path>
                </svg>
                <span id="branch-name">--</span>
            </span>
        </div>
        <div class="status-center">
            <span id="cursor-position" class="status-item">Ln 1, Col 1</span>
        </div>
        <div class="status-right">
            <span id="token-usage" class="status-item">Tokens: 0</span>
            <span id="active-model" class="status-item">--</span>
        </div>
    </footer>

    <script src="utils/marked.min.js"></script>
    <script src="utils/icons.js"></script>
    <script src="main.js"></script>
</body>
</html>
